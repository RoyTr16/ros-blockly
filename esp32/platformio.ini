; Shared settings for all ESP32 boards
[common]
platform = espressif32 @ ~6.5.0
framework = arduino
monitor_speed = 115200
extra_scripts = pre:link_microros.py
lib_deps =
    https://github.com/micro-ROS/micro_ros_arduino.git#jazzy
    fastled/FastLED@^3.9.0

[env:esp32-s3-devkitc-1]
extends = common
board = esp32-s3-devkitc-1
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DLED_PIN=48
    -DHAS_WS2812=1

[env:esp32dev]
extends = common
board = esp32dev
build_flags =
    -DLED_PIN=2
