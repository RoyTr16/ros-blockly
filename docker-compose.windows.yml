# Windows Docker Compose (Docker Desktop + WSL2)
#
# On Windows, Docker Desktop runs containers behind a WSL2 NAT that blocks
# UDP multicast. This prevents DDS discovery from reaching physical LAN robots.
# The zenoh-bridge service tunnels DDS traffic over TCP to a native Windows
# relay (start_windows_relay.bat) which re-broadcasts onto the physical network.
#
# Usage:
#   docker compose -f docker-compose.windows.yml up                      (LAN robots)
#   docker compose -f docker-compose.windows.yml --profile sim up        (with simulator)
#   docker compose -f docker-compose.windows.yml --profile ollama up     (with local Ollama)
#   docker compose -f docker-compose.windows.yml --profile microros up   (with micro-ROS agent for ESP32)
#   Profiles can be combined: --profile sim --profile ollama --profile microros

services:
  zenoh-bridge:
    image: eclipse/zenoh-bridge-ros2dds:latest
    command: -e tcp/host.docker.internal:7447
    ipc: host
    networks:
      - ros_net

  rosbridge:
    build:
      context: ./docker/rosbridge
    ipc: host
    ports:
      - "${ROSBRIDGE_PORT}:9090"
    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    networks:
      - ros_net

  robot:
    profiles: ["sim"]
    build:
      context: ./docker/robot
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID}
      - GZ_PARTITION=${GZ_PARTITION}
      - ROBOT_MODEL=${ROBOT_MODEL:-ur5}
    volumes:
      - ./docker/robots:/app/robots
    depends_on:
      - simulator
    ipc: host
    networks:
      - ros_net

  client:
    build:
      context: ./client
    container_name: ros-client-app
    ports:
      - "${CLIENT_PORT}:5173"
    environment:
      - VITE_GEMINI_API_KEY=${VITE_GEMINI_API_KEY}
      - VITE_OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3:8b}
    volumes:
      - ./client:/app
      - /app/node_modules
    networks:
      - ros_net

  microros:
    profiles: ["microros"]
    build:
      context: ./docker/microros
    ports:
      - "8888:8888/udp"
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID}
    command: udp4 --port 8888 -v4
    networks:
      - ros_net

  simulator:
    profiles: ["sim"]
    build:
      context: ./docker/simulator
    ports:
      - "${VNC_PORT}:8080"
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID}
      - ROBOT_MODEL=${ROBOT_MODEL:-vehicle_blue}
      - GZ_PARTITION=${GZ_PARTITION}
    volumes:
      - ./docker/robots:/app/robots
    privileged: true
    ipc: host
    shm_size: '2gb'
    networks:
      - ros_net

  ollama:
    profiles: ["ollama"]
    image: ollama/ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    environment:
      - OLLAMA_ORIGINS=*
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

networks:
  ros_net:
    driver: bridge

volumes:
  ollama_data:
