# Linux Docker Compose
#
# On Linux, rosbridge runs with host networking so DDS multicast reaches
# physical LAN robots directly — no Zenoh tunnel needed.
#
# Usage:
#   docker compose up                (LAN robots)
#   docker compose --profile sim up  (with simulator)
#   docker compose --profile ollama up (with local Ollama)
#   Profiles can be combined: --profile sim --profile ollama
#
# For Windows (Docker Desktop / WSL2), use docker-compose.windows.yml instead.

services:
  rosbridge:
    build:
      context: ./docker/rosbridge
    network_mode: host
    ipc: host
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID}
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp

  robot:
    profiles: ["sim"]
    build:
      context: ./docker/robot
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID}
      - GZ_PARTITION=${GZ_PARTITION}
      - ROBOT_MODEL=${ROBOT_MODEL:-ur5}
    volumes:
      - ./docker/robots:/app/robots
    depends_on:
      - simulator
    ipc: host
    networks:
      - ros_net

  client:
    build:
      context: ./client
    container_name: ros-client-app
    ports:
      - "${CLIENT_PORT}:5173"
    environment:
      - VITE_GEMINI_API_KEY=${VITE_GEMINI_API_KEY}
      - VITE_OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3:8b}
    volumes:
      - ./client:/app
      - /app/node_modules

  simulator:
    profiles: ["sim"]
    build:
      context: ./docker/simulator
    ports:
      - "${VNC_PORT}:8080"
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID}
      - ROBOT_MODEL=${ROBOT_MODEL:-vehicle_blue}
      - GZ_PARTITION=${GZ_PARTITION}
    volumes:
      - ./docker/robots:/app/robots
    privileged: true
    ipc: host
    shm_size: '2gb'
    networks:
      - ros_net

  ollama:
    profiles: ["ollama"]
    image: ollama/ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    environment:
      - OLLAMA_ORIGINS=*
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

networks:
  ros_net:
    driver: bridge

volumes:
  ollama_data:
