services:
  zenoh-bridge:
    image: eclipse/zenoh-bridge-ros2dds:latest
    command: -e tcp/host.docker.internal:7447
    ipc: host
    networks:
      - ros_net

  rosbridge:
    build:
      context: ./docker/rosbridge
    ipc: host
    ports:
      - "${ROSBRIDGE_PORT}:9090"
    networks:
      - ros_net

  robot:
    profiles: ["sim"]
    build:
      context: ./docker/robot
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID}
      # Gazebo Transport settings for discovery across containers
      - GZ_PARTITION=${GZ_PARTITION}
      - ROBOT_MODEL=${ROBOT_MODEL:-ur5}
    volumes:
      - ./docker/robots:/app/robots
    depends_on:
      - simulator
    ipc: host
    networks:
      - ros_net

  client:
    build:
      context: ./client
    container_name: ros-client-app
    ports:
      - "${CLIENT_PORT}:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    networks:
      - ros_net

  simulator:
    profiles: ["sim"]
    build:
      context: ./docker/simulator
    ports:
      - "${VNC_PORT}:8080"
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID}
      - ROBOT_MODEL=${ROBOT_MODEL:-vehicle_blue}
      - GZ_PARTITION=${GZ_PARTITION}
    volumes:
      - ./docker/robots:/app/robots
    privileged: true
    ipc: host
    shm_size: '2gb'
    networks:
      - ros_net

networks:
  ros_net:
    driver: bridge
