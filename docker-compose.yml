services:
  rosbridge:
    build:
      context: ./docker/rosbridge
    ports:
      - "9090:9090"
    networks:
      - ros_net

  robot:
    build:
      context: ./docker/robot
    environment:
      - ROS_DOMAIN_ID=0
      # Gazebo Transport settings for discovery across containers
      - GZ_PARTITION=sim
      - ROBOT_MODEL=${ROBOT_MODEL:-ur5}
    volumes:
      - ./docker/robots:/app/robots
    depends_on:
      - simulator
    networks:
      - ros_net

  client:
    build:
      context: ./client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    networks:
      - ros_net

  simulator:
    build:
      context: ./docker/simulator
    ports:
      - "8080:8080"
    environment:
      - ROS_DOMAIN_ID=0
      - ROBOT_MODEL=${ROBOT_MODEL:-vehicle_blue}
      - GZ_PARTITION=sim
    volumes:
      - ./docker/robots:/app/robots
    privileged: true
    shm_size: '2gb'
    networks:
      - ros_net

networks:
  ros_net:
    driver: bridge
